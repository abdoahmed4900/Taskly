@if (isLoggedIn()) {
  <div
    class="fixed hidden lg:block inset-y-0 left-0 bg-(--surface-low) shadow-xl transition-all duration-300"
    [class.w-64]="isOpen()"
    [class.w-20]="!isOpen()"
  >
    <aside appClickOutside (clickOutside)="close()" class="h-full flex flex-col justify-between">
      <div class="p-4">
        <section [class.px-4.mt-1]="!isOpen()" class="logo flex flex-row gap-1 items-center">
          <app-website-icon></app-website-icon>
          <p
            [class.hidden]="!isOpen()"
            class="text-[20px] font-bold leading-7 tracking-[-0.5px] text-(--slate-nature-first)"
          >
            Taskly
          </p>
        </section>
        <nav class="mt-8">
          <ul class="flex flex-col gap-7">
            @for (item of items; track item.route) {
              <li
                [routerLink]="item.route"
                class="flex items-center transition rounded-lg"
                [class.justify-center.items-center]="!isOpen()"
                [class.p-4]="isOpen()"
                [class.py-4]="!isOpen()"
                [class.bg-white]="currentUrl() === item.route"
              >
                <ng-container *ngComponentOutlet="item.icon"> </ng-container>

                @if (isOpen()) {
                  <p class="ml-2 text-[14px] font-medium" [class.text-(--primary)]="currentUrl() === item.route">
                    {{ item.title }}
                  </p>
                }
              </li>
            }
          </ul>
        </nav>
      </div>

      <section>
        <button
          [class.hidden]="isOpen()"
          (click)="toggleSideBar()"
          class="hidden px-6 py-3 lg:flex flex-row items-center gap-2 justify-start"
        >
          <svg
            [class.hidden]="!isOpen()"
            width="12"
            height="20"
            viewBox="0 0 12 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M10 20L0 10L10 0L11.775 1.775L3.55 10L11.775 18.225L10 20Z" fill="#041B3C" />
          </svg>

          <svg
            [class.hidden]="isOpen()"
            width="12"
            height="20"
            viewBox="0 0 12 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M1.78301 6.16699e-06L11.7787 10.0043L1.77442 20L0.000178955 18.2242L8.22871 10.0028L0.00725113 1.77424L1.78301 6.16699e-06Z"
              fill="#041B3C"
            />
          </svg>

          <p
            [class.hidden]="!isOpen()"
            class="text-[14px] font-medium leading-5 tracking-normal text-(--slate-nature-first) transition"
          >
            Collapse
          </p>
        </button>
        <div class="px-6 py-3 flex flex-row items-center gap-2 justify-start">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M2 18C1.45 18 0.979167 17.8042 0.5875 17.4125C0.195833 17.0208 0 16.55 0 16V2C0 1.45 0.195833 0.979167 0.5875 0.5875C0.979167 0.195833 1.45 0 2 0H9V2H2V16H9V18H2ZM13 14L11.625 12.55L14.175 10H6V8H14.175L11.625 5.45L13 4L18 9L13 14Z"
              fill="#BA1A1A"
            />
          </svg>
          <button
            [class.hidden]="!isOpen()"
            (click)="logout()"
            class="text-[14px] font-medium leading-5 tracking-normal text-(--error) transition"
          >
            Logout
          </button>
        </div>
      </section>
    </aside>
  </div>
}
