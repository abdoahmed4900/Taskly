<main class="flex flex-col gap-6">
  <section class="flex flex-col lg:gap-0 gap-3 lg:border lg:border-[#C3C6D626] lg:rounded-lg">
    @for (item of currentTasks(); track item.id) {
      <div
        class="flex lg:border-0 lg:border-b lg:border-[#C3C6D626] border border-(--icon-bg-color) lg:rounded-none rounded-lg flex-row w-full justify-between items-center p-4"
      >
        <div class="task-assignee flex flex-col gap-1">
          <h3 class="font-medium text-[1rem] leading-6 tracking-normal align-middle text-(--slate-nature-first)">
            {{ item.title }}
          </h3>
          @if (item.assignee.name) {
            <div class="flex flex-row gap-1.5">
              <p
                class="rounded-full bg-[#CDDDFF] font-bold text-[0.5rem] p-1 leading-3 tracking-normal align-middle text-center"
              >
                {{ getInitials(item.assignee.name) }}
              </p>
              <p class="font-normal text-[0.75rem] leading-4 align-middle tracking-normal text-[#041B3C99]">
                {{ item.assignee.name }}
              </p>
            </div>
          }
        </div>
        @if (item.dueDate) {
          <div class="flex flex-col gap-1 my-2">
            <h3
              class="hidden lg:block font-bold text-[0.625rem] leading-3.75 tracking-normal align-middle uppercase text-[#041B3C66]"
            >
              Due Date
            </h3>
            @if (item.dueDate > today) {
              <p class="font-medium text-[0.75rem] leading-4 tracking-normal align-middle text-[#041B3CB2]">
                {{ item.dueDate }}
              </p>
            } @else {
              <p class="flex flex-row gap-1.5 items-center">
                <span class="my-1"
                  ><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M5.83333 8.75C5.99861 8.75 6.13715 8.6941 6.24896 8.58229C6.36076 8.47049 6.41667 8.33194 6.41667 8.16667C6.41667 8.00139 6.36076 7.86285 6.24896 7.75104C6.13715 7.63924 5.99861 7.58333 5.83333 7.58333C5.66806 7.58333 5.52951 7.63924 5.41771 7.75104C5.3059 7.86285 5.25 8.00139 5.25 8.16667C5.25 8.33194 5.3059 8.47049 5.41771 8.58229C5.52951 8.6941 5.66806 8.75 5.83333 8.75ZM5.25 6.41667H6.41667V2.91667H5.25V6.41667ZM5.83333 11.6667C5.02639 11.6667 4.26806 11.5135 3.55833 11.2073C2.84861 10.901 2.23125 10.4854 1.70625 9.96042C1.18125 9.43542 0.765625 8.81806 0.459375 8.10833C0.153125 7.39861 0 6.64028 0 5.83333C0 5.02639 0.153125 4.26806 0.459375 3.55833C0.765625 2.84861 1.18125 2.23125 1.70625 1.70625C2.23125 1.18125 2.84861 0.765625 3.55833 0.459375C4.26806 0.153125 5.02639 0 5.83333 0C6.64028 0 7.39861 0.153125 8.10833 0.459375C8.81806 0.765625 9.43542 1.18125 9.96042 1.70625C10.4854 2.23125 10.901 2.84861 11.2073 3.55833C11.5135 4.26806 11.6667 5.02639 11.6667 5.83333C11.6667 6.64028 11.5135 7.39861 11.2073 8.10833C10.901 8.81806 10.4854 9.43542 9.96042 9.96042C9.43542 10.4854 8.81806 10.901 8.10833 11.2073C7.39861 11.5135 6.64028 11.6667 5.83333 11.6667ZM5.83333 10.5C7.13611 10.5 8.23958 10.0479 9.14375 9.14375C10.0479 8.23958 10.5 7.13611 10.5 5.83333C10.5 4.53056 10.0479 3.42708 9.14375 2.52292C8.23958 1.61875 7.13611 1.16667 5.83333 1.16667C4.53056 1.16667 3.42708 1.61875 2.52292 2.52292C1.61875 3.42708 1.16667 4.53056 1.16667 5.83333C1.16667 7.13611 1.61875 8.23958 2.52292 9.14375C3.42708 10.0479 4.53056 10.5 5.83333 10.5Z"
                      fill="#BA1A1A"
                    />
                  </svg>
                </span>
                <span class="font-bold text-[0.7rem] leading-4 uppercase align-middle tracking-[-0.55px] text-(--error)"
                  >Overdue</span
                >
              </p>
            }
          </div>
        }
      </div>
    }
    <button
      [routerLink]="['/project', projectId(), 'tasks', 'new']"
      class="lg:hidden flex py-4 flex-row justify-center items-center gap-2 border-2 border-dashed border-[#C3C6D64D]"
    >
      <span>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M6.75 11.25H8.25V8.25H11.25V6.75H8.25V3.75H6.75V6.75H3.75V8.25H6.75V11.25ZM7.5 15C6.4625 15 5.4875 14.8031 4.575 14.4094C3.6625 14.0156 2.86875 13.4812 2.19375 12.8062C1.51875 12.1312 0.984375 11.3375 0.590625 10.425C0.196875 9.5125 0 8.5375 0 7.5C0 6.4625 0.196875 5.4875 0.590625 4.575C0.984375 3.6625 1.51875 2.86875 2.19375 2.19375C2.86875 1.51875 3.6625 0.984375 4.575 0.590625C5.4875 0.196875 6.4625 0 7.5 0C8.5375 0 9.5125 0.196875 10.425 0.590625C11.3375 0.984375 12.1312 1.51875 12.8062 2.19375C13.4812 2.86875 14.0156 3.6625 14.4094 4.575C14.8031 5.4875 15 6.4625 15 7.5C15 8.5375 14.8031 9.5125 14.4094 10.425C14.0156 11.3375 13.4812 12.1312 12.8062 12.8062C12.1312 13.4812 11.3375 14.0156 10.425 14.4094C9.5125 14.8031 8.5375 15 7.5 15ZM7.5 13.5C9.175 13.5 10.5938 12.9188 11.7563 11.7563C12.9188 10.5938 13.5 9.175 13.5 7.5C13.5 5.825 12.9188 4.40625 11.7563 3.24375C10.5938 2.08125 9.175 1.5 7.5 1.5C5.825 1.5 4.40625 2.08125 3.24375 3.24375C2.08125 4.40625 1.5 5.825 1.5 7.5C1.5 9.175 2.08125 10.5938 3.24375 11.7563C4.40625 12.9188 5.825 13.5 7.5 13.5Z"
            fill="#434654"
            fill-opacity="0.6"
          />
        </svg>
      </span>
      <span
        class="font-bold text-[0.75rem] leading-4 tracking-[1.2px] text-center align-middle uppercase text-[#43465499]"
      >
        Add new task
      </span>
    </button>
  </section>
</main>
