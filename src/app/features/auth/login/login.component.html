<main class="md:mb-16 mb-12 flex flex-col">
  <section
    class="flex flex-col justify-center md:my-36.75 mt-26 mx-auto items-center w-full max-w-120 md:shadow-(--container-shadow) rounded-xl md:p-(--form-padding) px-6"
  >
    <header class="flex flex-col gap-2 items-center">
      <h1
        class="text-[1.875rem] text-(--slate-nature-first) font-semibold md:mx-auto mx-8.75 tracking-[-0.75px] leading-9 align-middle"
      >
        Welcome Back
      </h1>
      <p class="form-control-subtitle md:px-5.5 px-13.75 text-center">
        Please enter your details to access your workspace.
      </p>
    </header>
    <form novalidate [formGroup]="loginForm" (ngSubmit)="login()" novalidate class="flex flex-col w-full mt-10 gap-6">
      <app-form-field-component
        label="EMAIL ADDRESS"
        controlName="Email"
        [control]="getControl('email')"
        placeholder="yourname@company.com"
        type="email"
      >
        <section class="email-icon absolute inset-e-3 top-[50%] translate-y-[-50%]">
          <svg width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M3.33333 17.6667C2.875 17.6667 2.48264 17.5035 2.15625 17.1771C1.82986 16.8507 1.66667 16.4583 1.66667 16V6C1.66667 5.54167 1.82986 5.14931 2.15625 4.82292C2.48264 4.49653 2.875 4.33333 3.33333 4.33333H16.6667C17.125 4.33333 17.5174 4.49653 17.8437 4.82292C18.1701 5.14931 18.3333 5.54167 18.3333 6V16C18.3333 16.4583 18.1701 16.8507 17.8437 17.1771C17.5174 17.5035 17.125 17.6667 16.6667 17.6667H3.33333ZM10 11.8333L3.33333 7.66667V16H16.6667V7.66667L10 11.8333ZM10 10.1667L16.6667 6H3.33333L10 10.1667ZM3.33333 7.66667V6V7.66667V16V7.66667Z"
              fill="#737685"
            />
          </svg>
        </section>
      </app-form-field-component>

      <section class="password-field relative">
        <section class="flex password-container absolute inset-e-0 mt-1">
          <a
            routerLink="/forgot-password"
            class="font-bold text-[0.69rem] md:hidden block leading-[16.5px] text-(--primary)"
            >Forgot?</a
          >
        </section>
        <app-form-field-component
          [type]="isPasswordVisible() ? 'text' : 'password'"
          label="PASSWORD"
          controlName="Password"
          placeholder="Enter your password"
          [control]="getControl('password')"
        >
          <app-password-visibility-icon
            (visibilityChanged)="setPasswordVisiblity($event)"
          ></app-password-visibility-icon>
        </app-form-field-component>
      </section>

      <section class="forgot-password py-2 flex flex-row flex-wrap justify-between">
        <section class="flex remember-me items-center flex-row gap-3 md:gap-2">
          <input
            class="md:appearance-none h-4 w-4 border border-(--slate-nature-third) rounded md:bg-(--surface-low) checked:bg-(--primary) checked:appearance-auto"
            [(ngModel)]="rememberUserForMonth"
            [ngModelOptions]="{ standalone: true }"
            type="checkbox"
            name="forgot-password"
            id="forgot-password"
          />
          <label
            class="text-[0.875rem] font-medium leading-5 tracking-normal text-(--paragraph-text-common-color)"
            for="forgot-password"
            >Remember Me</label
          >
        </section>
        <a
          routerLink="/forgot-password"
          class="text-[0.875rem] hidden md:block font-medium leading-5 tracking-normal text-(--primary)"
        >
          Forgot Password?
        </a>
      </section>

      <app-submit-button
        [isButtonDisabled]="loginForm.invalid"
        [isLoading]="isLoading()"
        buttonClass="md:py-3 py-4 text-[0.875rem] mb-4 md:mb-0"
      >
        <span class="hidden md:inline-block">Login</span>

        <span class="flex items-center justify-center gap-2 md:hidden">
          <span>Sign In</span>

          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M10.1458 7.5H0V5.83333H10.1458L5.47917 1.16667L6.66667 0L13.3333 6.66667L6.66667 13.3333L5.47917 12.1667L10.1458 7.5Z"
              fill="white"
            />
          </svg>
        </span>
      </app-submit-button>
    </form>

    <div class="mt-auto">
      <app-sign-up-section></app-sign-up-section>
    </div>
  </section>
</main>
