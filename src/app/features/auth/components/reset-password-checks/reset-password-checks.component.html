<main class="password-checks rounded-sm bg-[#C3C6D61A] p-3 grid md:grid-cols-2 grid-cols-1 gap-5">
  <header class="md:col-span-2 col-span-1">
    <h1 class="text-[11px] font-bold leading-[16.5px] tracking-[0.55px] text-[#434654]">Security Requirements</h1>
  </header>
  <section class="password-check flex flex-row gap-2 items-center">
    <ng-container *ngComponentOutlet="passwordFirstCheckComponent()"></ng-container>

    <p class="text-[#434654] font-normal text-[11px] leading-[16.5px] tracking-normal" text-[#434654]>
      8-64 characters
    </p>
  </section>
  <section class="password-check flex flex-row gap-2 items-center">
    <ng-container *ngComponentOutlet="passwordSecondCheckComponent()"></ng-container>

    <p class="text-[#434654] font-normal text-[11px] leading-[16.5px] tracking-normal">Uppercase letter</p>
  </section>
  <section class="password-check flex flex-row gap-2 items-center">
    <ng-container *ngComponentOutlet="passwordThirdCheckComponent()"></ng-container>

    <p class="text-[#434654] font-normal text-[11px] leading-[16.5px] tracking-normal">Lowercase letter</p>
  </section>
  <section class="password-check flex flex-row gap-2 items-center">
    <ng-container *ngComponentOutlet="passwordFourthCheckComponent()"></ng-container>

    <p class="text-[#434654] font-normal text-[11px] leading-[16.5px] tracking-normal">One digit</p>
  </section>
  <section class="password-check flex flex-row gap-2 items-center">
    <ng-container *ngComponentOutlet="passwordFifthCheckComponent()"></ng-container>

    <p class="text-[#434654] font-normal text-[11px] leading-[16.5px] tracking-normal">Special character</p>
  </section>
</main>
