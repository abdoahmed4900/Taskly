<button
  type="submit"
  [disabled]="isButtonDisabled() || isLoading()"
  [class]="
    'flex w-full items-center justify-center rounded-sm bg-linear-to-r from-[#0052CC] to-[#003D99] text-white leading-6 tracking-normal font-semibold' +
    buttonClass()
  "
>
  @if (isLoading()) {
    <svg
      class="size-[1.5em] animate-spin text-white"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25" />
      <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
  } @else {
    <ng-content />
  }
</button>
