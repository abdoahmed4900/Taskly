<table
  class="w-full hidden lg:table max-w-196.25 mx-auto shadow-[0px_1px_2px_0px_#0000000D] border-4 border-separate border-gray-200 rounded-lg"
>
  <thead class="bg-[#E0E8FF4D]">
    <tr>
      <th
        scope="col"
        class="font-bold text-[0.7rem] text-left py-5 ps-13 leading-[100%] tracking-[1.1px] align-middle uppercase text-(--paragraph-text-common-color)"
      >
        MEMBER
      </th>
      <th
        scope="col"
        class="font-bold py-5 ps-8 text-[0.7rem] leading-[100%] tracking-[1.1px] align-middle uppercase text-(--paragraph-text-common-color)"
      >
        ROLE
      </th>
      <th
        scope="col"
        class="font-bold py-5 pe-13 text-right text-[0.7rem] leading-[100%] tracking-[1.1px] align-middle uppercase text-(--paragraph-text-common-color)"
      >
        ACTIONS
      </th>
    </tr>
  </thead>

  <tbody>
    @for (item of members(); track item.projectId) {
      <tr class="border-b border-(--icon-bg-color)">
        <td class="py-8 ps-8.75 pe-26">
          <div class="flex flex-row items-center gap-4 whitespace-nowrap">
            <p
              class="font-bold text-[0.875rem] leading-5 tracking-normal text-center align-middle bg-[#DAE2FF] text-(--primary) rounded-xl py-3.5 px-3.25"
            >
              {{ getNameInitials(item.name) }}
            </p>
            <div class="flex flex-col">
              <p class="font-semibold text-[0.875rem] leading-5 tracking-normal align-middle">{{ item.name }}</p>
              <p class="font-normal text-[0.75rem] leading-4 tracking-normal align-middle">
                {{ item.email }}
              </p>
            </div>
          </div>
        </td>
        <td class="ps-8 py-8.5">
          <p
            class="font-bold py-1 px-3 text-center rounded-full text-[0.875rem] uppercase tracking-[0.5px] align-middle bg-(--primary) text-white"
          >
            {{ item.role }}
          </p>
        </td>
        @if (item.role === 'Owner') {
          <td class="p-8 text-right ps-32 pe-0">
            <svg width="4" height="16" viewBox="0 0 4 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M2 16C1.45 16 0.979167 15.8042 0.5875 15.4125C0.195833 15.0208 0 14.55 0 14C0 13.45 0.195833 12.9792 0.5875 12.5875C0.979167 12.1958 1.45 12 2 12C2.55 12 3.02083 12.1958 3.4125 12.5875C3.80417 12.9792 4 13.45 4 14C4 14.55 3.80417 15.0208 3.4125 15.4125C3.02083 15.8042 2.55 16 2 16ZM2 10C1.45 10 0.979167 9.80417 0.5875 9.4125C0.195833 9.02083 0 8.55 0 8C0 7.45 0.195833 6.97917 0.5875 6.5875C0.979167 6.19583 1.45 6 2 6C2.55 6 3.02083 6.19583 3.4125 6.5875C3.80417 6.97917 4 7.45 4 8C4 8.55 3.80417 9.02083 3.4125 9.4125C3.02083 9.80417 2.55 10 2 10ZM2 4C1.45 4 0.979167 3.80417 0.5875 3.4125C0.195833 3.02083 0 2.55 0 2C0 1.45 0.195833 0.979167 0.5875 0.5875C0.979167 0.195833 1.45 0 2 0C2.55 0 3.02083 0.195833 3.4125 0.5875C3.80417 0.979167 4 1.45 4 2C4 2.55 3.80417 3.02083 3.4125 3.4125C3.02083 3.80417 2.55 4 2 4Z"
                fill="#434654"
              />
            </svg>
          </td>
        }
      </tr>
    }
  </tbody>
</table>
